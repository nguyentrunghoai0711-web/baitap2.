<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* Body & Container tràn màn hình */
        body, html { height: 100%; overflow: hidden; background: #fff; }
        .container { display: flex; flex-direction: column; height: 100vh; }

        /* Banner tinh gọn */
        .banner {
            background: linear-gradient(90deg, #001e3c, #003c78), url('contents/57328090_605827826563664_6756081408847904768_o_1 (1).jpg') center/cover;
            color: white; padding: 20px 40px; border-bottom: 4px solid #fc0;
        }
        .school-name { font-size: 2rem; font-weight: 800; border-left: 6px solid #fc0; padding-left: 15px; }
        .specialty { font-size: 1.2rem; font-style: italic; opacity: 0.9; padding-left: 21px; }

        /* Menu */
        .menu { background: #0b2b4f; padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .menu a { 
            color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem;
            padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
        }
        .menu a:hover { background: #fc0; color: #0b2b4f; }

        /* Ô nội dung TO TOÀN DIỆN (Đã xóa khoảng trắng/xám) */
        .content { flex: 1; width: 100%; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <div class="school-name">TRƯỜNG THPT NGÔ QUYỀN TPHCM</div>
            <div class="specialty">Chuyên trang Tin học 12</div>
        </div>
        <div class="menu">
            <a href="contents/gioithieu.html" target="noidung">Giới thiệu</a>
            <a href="contents/thoikhoabieu.html" target="noidung">Thời khóa biểu</a>
            <a href="contents/tinhoc12.html" target="noidung">Tin học 12</a>
            <a href="contents/gioithieunghe.html" target="noidung">Nghề nghiệp</a>
        </div>
        <div class="content">
            <iframe name="noidung" src="contents/thoikhoabieu.html"></iframe>
        </div>
    </div>
</body>
</html>
