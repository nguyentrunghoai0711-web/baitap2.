<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Tối ưu hóa toàn bộ trang để không còn khoảng trống thừa */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body, html {
            height: 100%;
            background: #fff;
            overflow: hidden; /* Ngăn thanh cuộn kép bên ngoài */
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* BANNER - Giữ nguyên phong cách cũ nhưng bỏ bo góc container */
        .banner {
            background: #003366; /* Màu xanh đậm như hình */
            color: white;
            padding: 30px 20px;
            border-bottom: 5px solid #ffcc00;
        }

        .school-name {
            font-size: 2.2rem;
            font-weight: bold;
            line-height: 1.1;
            border-left: 10px solid #ffcc00;
            padding-left: 15px;
            text-transform: uppercase;
        }

        .specialty {
            font-size: 1.3rem;
            font-style: italic;
            margin-top: 10px;
            padding-left: 25px;
        }

        /* MENU - Các nút bo tròn như hình bạn gửi */
        .menu {
            background: #0b2b4f;
            padding: 15px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid #4a6a8a;
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .menu a:hover {
            background: #ffcc00;
            color: #0b2b4f;
        }

        /* Ô NỘI DUNG - Xóa bỏ hoàn toàn ô xám và xanh dương thừa */
        .content {
            flex: 1; /* Tự động lấp đầy phần còn lại của màn hình */
            width: 100%;
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">
        <div class="school-name">TRƯỜNG THPT<br>NGÔ QUYỀN<br>TPHCM</div>
        <div class="specialty">Chuyên trang Tin học 12</div>
    </div>

    <div class="menu">
        <a href="contents/gioithieu.html" target="noidung">Giới thiệu</a>
        <a href="contents/thoikhoabieu.html" target="noidung">Thời khóa biểu</a>
        <a href="contents/tinhoc12.html" target="noidung">Tin học 12</a>
        <a href="contents/gioithieunghe.html" target="noidung">Nghề nghiệp</a>
    </div>

    <div class="content">
        <iframe name="noidung" src="contents/tinhoc12.html"></iframe>
    </div>
</div>

</body>
</html>
