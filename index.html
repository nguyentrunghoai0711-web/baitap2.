<html class="fullsize">
<head>
    <link href="style.css" rel="stylesheet">
    <style>
        /* style.css được nhúng trực tiếp để dễ tùy chỉnh */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 24px 24px 16px 16px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER với BANNER cải tiến */
        .header {
            width: 100%;
        }

        .banner {
            background-image: linear-gradient(90deg, rgba(0, 30, 60, 0.75) 0%, rgba(0, 60, 120, 0.6) 100%), 
            url('contents/57328090_605827826563664_6756081408847904768_o_1 (1).jpg');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            height: 200px; /* banner cao hơn, sang trọng */
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 4px solid #ffcc00;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.1);
            transition: height 0.2s ease;
        }

        .banner-content {
            color: white;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.7), 0 0 20px rgba(255,215,0,0.5);
            max-width: 800px;
            backdrop-filter: blur(1px);
        }

        .school-name {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            line-height: 1.2;
            text-transform: uppercase;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            border-left: 8px solid #ffcc00;
            padding-left: 20px;
            margin-bottom: 8px;
        }

        .specialty {
            font-size: 1.8rem;
            font-weight: 400;
            font-style: italic;
            text-shadow: 2px 2px 4px black;
            font-family: 'Playfair Display', 'Georgia', serif;
            letter-spacing: 1px;
            padding-left: 28px;
            color: #f0f9ff;
        }

        /* MENU - Đã chỉnh sửa: giảm padding để sát banner hơn */
        .menu {
            background: #0b2b4f;
            padding: 8px 20px;  /* Giảm từ 14px xuống 8px */
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            border-bottom: 2px solid #ffcc00;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 8px 22px;  /* Giảm padding trên/dưới từ 10px xuống 8px */
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            transition: 0.3s;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.3);
            text-transform: capitalize;
            font-family: 'Segoe UI', sans-serif;
        }

        .menu a:hover {
            background: #ffcc00;
            color: #0b2b4f;
            border-color: #ffcc00;
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(255,204,0,0.3);
        }

        /* CONTENT - Đã chỉnh sửa: đổi nền thành màu trắng */
        .content {
            background: #ffffff;  /* Đổi từ #f8faff sang màu trắng */
            padding: 25px;
            min-height: 500px;
            flex: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 550px;
            border: none;
            border-radius: 16px;
            background: #ffffff;  /* Đổi từ #f8faff sang màu trắng */
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02);
        }

        .footer {
            background: #0a1e32;
            height: 20px;
            border-top: 3px solid #ffcc00;
        }

        /* Responsive nhẹ */
        @media (max-width: 700px) {
            .banner { height: 160px; padding: 0 20px; }
            .school-name { font-size: 2rem; }
            .specialty { font-size: 1.3rem; }
            .menu { padding: 6px 15px; }  /* Giảm thêm cho mobile */
            .menu a { font-size: 0.95rem; padding: 6px 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="banner">
                <div class="banner-content">
                    <div class="school-name">TRƯỜNG THPT NGÔ QUYỀN TPHCM</div>
                    <div class="specialty">Chuyên trang Tin học 12</div>
                </div>
            </div>
        </div>
        <div class="menu">
            <a href="contents/gioithieu.html" target="noidung">Gioi thieu</a>
            <a href="contents/thoikhoabieu.html" target="noidung">Thoi khoa bieu</a>
            <a href="contents/tinhoc12.html" target="noidung">Chuong trinh tin hoc 12</a>
            <a href="contents/gioithieunghe.html" target="noidung">Gioi thieu nghe</a>
        </div>
        <div class="content">
            <iframe name="noidung"></iframe>
        </div>
        <div class="footer"></div>
    </div>
</body>
</html>
